<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easter Egg Hunt</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #e8527a;
    --pink-light: #f9d0dc;
    --pink-pale: #fef0f4;
    --lilac: #c084fc;
    --lilac-light: #ede9fe;
    --yellow: #fbbf24;
    --yellow-light: #fef9c3;
    --mint: #34d399;
    --mint-light: #d1fae5;
    --bg: #fffaf9;
    --card: #ffffff;
    --text: #2d1a20;
    --text-muted: #9d6e7a;
    --border: #f3d5dc;
    --radius: 20px;
    --radius-sm: 12px;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
  }

  body {
    background-image:
      radial-gradient(circle at 15% 20%, #fce4ec55 0%, transparent 40%),
      radial-gradient(circle at 85% 75%, #ede9fe55 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, #fef9c355 0%, transparent 60%);
    background-attachment: fixed;
  }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
  }

  /* ── header ── */
  .header {
    text-align: center;
    margin-bottom: 1.75rem;
    animation: fadeDown 0.6s ease both;
  }
  .header h1 {
    font-size: clamp(1.5rem, 5vw, 2rem);
    font-weight: 800;
    color: var(--pink);
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .header p {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-top: 0.35rem;
    font-family: 'Lora', serif;
    font-style: italic;
  }

  /* ── progress ── */
  .progress-wrap {
    width: 100%;
    max-width: 420px;
    margin-bottom: 1.5rem;
    animation: fadeDown 0.6s 0.1s ease both;
  }
  .progress-row {
    display: flex;
    gap: 5px;
    justify-content: center;
  }
  .pip {
    flex: 1;
    max-width: 38px;
    height: 8px;
    border-radius: 4px;
    background: var(--border);
    transition: background 0.4s ease, transform 0.2s ease;
  }
  .pip.done { background: var(--pink); }
  .pip.active { background: var(--pink-light); transform: scaleY(1.4); }
  .progress-label {
    text-align: center;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.5rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ── clue card ── */
  .clue-card {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem 1.5rem;
    text-align: center;
    box-shadow: 0 8px 32px rgba(232, 82, 122, 0.08), 0 2px 8px rgba(0,0,0,0.04);
    animation: fadeUp 0.5s ease both;
    position: relative;
    overflow: hidden;
  }
  .clue-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--pink), var(--lilac), var(--yellow));
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .clue-badge {
    display: inline-block;
    background: var(--pink-pale);
    color: var(--pink);
    font-size: 0.7rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 1rem;
    border: 1px solid var(--pink-light);
  }

  .clue-text {
    font-family: 'Lora', serif;
    font-size: clamp(0.95rem, 3vw, 1.05rem);
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 1.5rem;
    white-space: pre-line;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 11px 22px;
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    border: none;
    outline: none;
    min-width: 90px;
  }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.35; cursor: default; transform: none; }

  .btn-back {
    background: white;
    color: var(--text-muted);
    border: 1.5px solid var(--border);
  }
  .btn-back:hover:not(:disabled) {
    background: var(--pink-pale);
    border-color: var(--pink-light);
    color: var(--pink);
  }

  .btn-found {
    background: var(--pink);
    color: white;
    box-shadow: 0 4px 14px rgba(232, 82, 122, 0.35);
  }
  .btn-found:hover:not(:disabled) {
    box-shadow: 0 6px 20px rgba(232, 82, 122, 0.45);
    transform: translateY(-1px);
  }

  .reveal-msg {
    margin-top: 1rem;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--mint);
    min-height: 18px;
    letter-spacing: 0.02em;
    opacity: 0;
    transition: opacity 0.4s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .reveal-msg.show { opacity: 1; }

  /* ── complete card ── */
  .complete-card {
    display: none;
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 1.5rem;
    text-align: center;
    box-shadow: 0 8px 32px rgba(232, 82, 122, 0.1);
    animation: fadeUp 0.6s ease both;
    position: relative;
    overflow: hidden;
  }
  .complete-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--mint), var(--yellow), var(--pink), var(--lilac));
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .complete-card h2 {
    font-size: 1.7rem;
    font-weight: 800;
    color: var(--pink);
    margin-bottom: 0.5rem;
  }
  .complete-card p {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--text-muted);
    line-height: 1.7;
  }
  .btn-restart {
    margin-top: 1.5rem;
    background: white;
    color: var(--text-muted);
    border: 1.5px solid var(--border);
    padding: 9px 22px;
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn-restart:hover {
    background: var(--pink-pale);
    border-color: var(--pink-light);
    color: var(--pink);
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* mobile fine-tune */
  @media (max-width: 380px) {
    .clue-card { padding: 1.4rem 1.1rem; }
    .btn { padding: 10px 16px; font-size: 0.88rem; }
    .clue-text { font-size: 0.92rem; }
  }
</style>
</head>
<body>

<div class="page">
  <header class="header">
    <h1>Easter Egg Hunt</h1>
    <p>Follow the riddles to find all 9 eggs</p>
  </header>

  <div class="progress-wrap">
    <div class="progress-row" id="progress"></div>
    <div class="progress-label" id="progressLabel"></div>
  </div>

  <div class="clue-card" id="clueCard">
    <div class="clue-badge" id="clueNum"></div>
    <div class="clue-text" id="clueText"></div>
    <div class="btn-row">
      <button class="btn btn-back" id="backBtn">← Back</button>
      <button class="btn btn-found" id="foundBtn">Found it!</button>
    </div>
    <div class="reveal-msg" id="revealMsg"></div>
  </div>

  <div class="complete-card" id="completeCard">
    <h2>You did it!</h2>
    <p>Every egg has been found.<br>Hope the hunt was worth it — happy Easter!</p>
    <button class="btn-restart" id="restartBtn">↺ Start over</button>
  </div>
</div>

<script>
const clues = [
  {
    text: "Every morning you face it, but it never faces back. Behind it lies a door — and within that door, something is waiting for you.",
    location: "Bathroom cabinet"
  },
  {
    text: "Wet things go in. Warm, dry things come out. It does its work with a slight rumble and heat. Look inside.",
    location: "Dryer"
  },
  {
    text: "In the area where the family gathers to eat, in a machine where bread dough is made and mixed.",
    location: "Dining room cabinet"
  },
  {
    text: "Cakes and bread find warmth in here. Open it up and find them inside.",
    location: "Oven"
  },
  {
    text: "See Psalm 150:5",
    location: "Drum kit"
  },
  {
    text: "They carry you everywhere and ask for nothing. Find where they rest when you don't need them — then put a pair on before you take the next step.",
    location: "Shoe cabinet"
  },
  {
    text: "It stands at the edge of the property. Letters visit it. Today, so does something else.",
    location: "Mailbox"
  },
  {
    text: "It protects you from wind, bugs and rain whilst you drive. Something is lying there.",
    location: "Windshield"
  },
  {
    text: "I store what proves you belong, what explains how things work, and sometimes what helps when things go wrong. I stay closed unless there’s a reason. What am I?",
    location: "Glovebox"
  }
];

let current = 0;
let maxReached = 0;

function buildProgress() {
  const el = document.getElementById('progress');
  el.innerHTML = '';
  for (let i = 0; i < clues.length; i++) {
    const pip = document.createElement('div');
    pip.className = 'pip' + (i < maxReached ? ' done' : i === current ? ' active' : '');
    el.appendChild(pip);
  }
  document.getElementById('progressLabel').textContent =
    maxReached + ' of ' + clues.length + ' eggs found';
}

function showClue(index, direction) {
  const c = clues[index];
  document.getElementById('clueNum').textContent = 'Clue ' + (index + 1) + ' of ' + clues.length;
  document.getElementById('clueText').textContent = c.text;

  const revealMsg = document.getElementById('revealMsg');
  const foundBtn = document.getElementById('foundBtn');

  if (index < maxReached) {
    revealMsg.textContent = 'Found: ' + c.location;
    revealMsg.classList.add('show');
    foundBtn.textContent = 'Found it!';
    foundBtn.disabled = false;
  } else {
    revealMsg.textContent = '';
    revealMsg.classList.remove('show');
    foundBtn.textContent = 'I found it!';
    foundBtn.disabled = false;
  }

  document.getElementById('backBtn').disabled = index === 0;
  buildProgress();
}

document.getElementById('foundBtn').addEventListener('click', function() {
  if (current >= maxReached) maxReached = current + 1;

  const revealMsg = document.getElementById('revealMsg');
  revealMsg.textContent = 'Found: ' + clues[current].location;
  revealMsg.classList.add('show');

  this.disabled = true;

  setTimeout(function() {
    document.getElementById('foundBtn').disabled = false;
    current++;
    if (current >= clues.length) {
      document.getElementById('clueCard').style.display = 'none';
      document.getElementById('completeCard').style.display = 'block';
      buildProgress();
    } else {
      showClue(current, 1);
    }
  }, 260);
});

document.getElementById('backBtn').addEventListener('click', function() {
  if (current === 0) return;
  current--;
  showClue(current, -1);
});

document.getElementById('restartBtn').addEventListener('click', function() {
  current = 0;
  maxReached = 0;
  document.getElementById('completeCard').style.display = 'none';
  document.getElementById('clueCard').style.display = 'block';
  showClue(0, undefined);
});

window.addEventListener('load', function() {
  showClue(0, undefined);
});
</script>
</body>
</html>
